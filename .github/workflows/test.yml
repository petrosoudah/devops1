name: test image-first deploy

on:
  push:
    branches: [test]

jobs:
  build-push-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4

      - name: Create fresh artifact from source
        run: |
          mkdir -p build_package dist
          # test rebuilds from source, it does not use the dev artifact
          python -m pip install --upgrade pip
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          SECRET_KEY=dummy ALLOWED_HOSTS=localhost POSTGRES_DB=bookshop_db POSTGRES_USER=bookshop_user POSTGRES_PASSWORD=dummy python manage.py collectstatic --noinput
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='artifacts' \
            --exclude='build_package' \
            --exclude='dist' \
            --exclude='.venv' \
            --exclude='*.tar.gz' \
            --exclude='db.sqlite3' \
            ./ build_package/
          pip freeze > build_package/requirements.lock
          tar -czf dist/app-${{ github.sha }}.tar.gz -C build_package .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image from fresh artifact
        run: |
          # this image is the thing we push forward from test
          docker build \
            --build-arg APP_ARTIFACT=dist/app-${{ github.sha }}.tar.gz \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/book_shop/test"

      - name: Deploy to EC2 from registry image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/book_shop/test
            docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' -p '${{ secrets.DOCKERHUB_TOKEN }}'
            # test pulls from docker hub instead of building on ec2
            IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} \
            APP_PORT=8002 \
            POSTGRES_PORT=5434 \
            SECRET_KEY='${{ secrets.SECRET_KEY }}' \
            POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            ALLOWED_HOSTS='${{ vars.EC2_HOST }},localhost,127.0.0.1' \
            docker compose -p bookshop_test up -d --pull always --remove-orphans
