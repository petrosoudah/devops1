services:

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookshop_net

  backend:
    build: .
    restart: on-failure
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - bookshop_net
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn book_shop.wsgi:application --bind 0.0.0.0:8000"
volumes:
  postgres_data:

networks:
  bookshop_net:
    driver: bridge